name: CD - Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master, feature_9]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # ── 1. Backend Build & Deploy ──
      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy unifyops-backend \
            --source ./backend \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "\
          ENVIRONMENT=production,\
          CORS_ORIGINS=https://unifyops.pratham-dusane.tech,\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Get Backend Cloud Run URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe unifyops-backend --region asia-south1 --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')
          echo "BACKEND_URL=${BACKEND_URL}" >> $GITHUB_ENV
          echo "Deployed Backend URL: ${BACKEND_URL}"

      # ── 2. Frontend Build & Deploy ──
      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy unifyops-frontend \
            --source ./frontend \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-build-env-vars "\
          NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }},\
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},\
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},\
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},\
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},\
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},\
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --set-env-vars NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            --quiet

      - name: Show Cloud Build Logs on Failure
        if: failure()
        run: |
          echo "=== Last 5 Cloud Build logs ==="
          BUILD_ID=$(gcloud builds list --region=asia-south1 --project=${{ secrets.GCP_PROJECT_ID }} --limit=1 --format='value(id)' 2>/dev/null || true)
          if [ -n "$BUILD_ID" ]; then
            gcloud builds log "$BUILD_ID" --region=asia-south1 --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || \
            gcloud builds log "$BUILD_ID" --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || \
            echo "Could not fetch build logs"
          else
            echo "No build ID found"
          fi
