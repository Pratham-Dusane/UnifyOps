name: CD - Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master, feature_9]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # ── 1. Backend Build & Deploy ──
      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy unifyops-backend \
            --source ./backend \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production

      - name: Get Backend Cloud Run URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe unifyops-backend --region asia-south1 --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')
          echo "BACKEND_URL=${BACKEND_URL}" >> $GITHUB_ENV
          echo "Deployed Backend URL: ${BACKEND_URL}"

      # ── 2. Frontend Build & Deploy ──
      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy unifyops-frontend \
            --source ./frontend \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-build-env-vars NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            --set-env-vars NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}
