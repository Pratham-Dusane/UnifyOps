name: CD - Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master, feature_9]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project & Configure Docker
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Enable GCP Required Services
        run: |
          gcloud services enable artifactregistry.googleapis.com run.googleapis.com --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Ensure Artifact Registry Repository Exists
        run: |
          gcloud artifacts repositories describe unifyops-repo --location=asia-south1 --project=${{ secrets.GCP_PROJECT_ID }} || \
          gcloud artifacts repositories create unifyops-repo \
            --repository-format=docker \
            --location=asia-south1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --description="UnifyOps Docker Container Repository"


      # ── 1. Backend Build & Deploy ──
      - name: Build & Push Backend Container
        run: |
          IMAGE_URI="asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/unifyops-repo/backend"
          docker build -t ${IMAGE_URI}:${{ github.sha }} -t ${IMAGE_URI}:latest ./backend
          docker push ${IMAGE_URI}:${{ github.sha }}
          docker push ${IMAGE_URI}:latest

      - name: Deploy Backend to Cloud Run
        run: |
          IMAGE_URI="asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/unifyops-repo/backend:latest"
          gcloud run deploy unifyops-backend \
            --image ${IMAGE_URI} \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production

      - name: Get Backend Cloud Run URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe unifyops-backend --region asia-south1 --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')
          echo "BACKEND_URL=${BACKEND_URL}" >> $GITHUB_ENV
          echo "Deployed Backend URL: ${BACKEND_URL}"

      # ── 2. Frontend Build & Deploy ──
      - name: Build & Push Frontend Container
        run: |
          IMAGE_URI="asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/unifyops-repo/frontend"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            -t ${IMAGE_URI}:${{ github.sha }} \
            -t ${IMAGE_URI}:latest ./frontend
          docker push ${IMAGE_URI}:${{ github.sha }}
          docker push ${IMAGE_URI}:latest

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE_URI="asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/unifyops-repo/frontend:latest"
          gcloud run deploy unifyops-frontend \
            --image ${IMAGE_URI} \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}
